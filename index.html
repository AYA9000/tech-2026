<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team 6 7 - Create Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <div class="login-screen">
      <div class="game-header">
        <div class="game-logo">🌍</div>
        <h1 class="game-title">Team 6 7</h1>
        <p class="game-subtitle">Connect • Play • Learn Together</p>
      </div>

      <div class="login-form-container">
        <div class="form-section">
          <h2 class="section-title">📝 Account Information</h2>
          
          <div class="form-group">
            <label for="username">Username</label>
            <div class="input-wrapper">
              <span class="input-icon">👤</span>
              <input type="text" id="username" placeholder="Enter your username" required autocomplete="username" />
            </div>
          </div>

          <div class="form-group">
            <label for="age">Age</label>
            <div class="input-wrapper">
              <span class="input-icon">🎂</span>
              <input type="number" id="age" placeholder="Your age" required min="10" max="120" />
            </div>
          </div>

          <div class="form-group">
            <label for="country">Country</label>
            <div class="input-wrapper">
              <span class="input-icon">🌎</span>
              <select id="country" onchange="updateCharacterSelection()" required>
                <option value="">Select Country</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="language">Language</label>
            <div class="input-wrapper">
              <span class="input-icon">🗣️</span>
              <select id="language" required>
                <option value="">Select Language</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="gender">Gender</label>
            <div class="input-wrapper">
              <span class="input-icon">🚻</span>
              <select id="gender" onchange="updateCharacterSelection()" required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
              </select>
            </div>
          </div>



        <button type="button" class="submit-btn" onclick="handleRegistration(event)">
          <span class="btn-icon">🚀</span>
          <span class="btn-text">Create Account & Start Playing</span>
          <span class="btn-glow"></span>
        </button>
      </div>

      <div class="login-footer">
        <p>Already have an account? <a href="#" onclick="showLogin()">Login here</a></p>
      </div>
    </div>

    <div class="background-elements">
      <div class="floating-element float-1">🌍</div>
      <div class="floating-element float-2">🎮</div>
      <div class="floating-element float-3">🎯</div>
      <div class="floating-element float-4">🏆</div>
    </div>
  </div>

  <script src="data/countries.js"></script>
  <script src="data/languages.js"></script>
  <script src="modules/auth.js"></script>
  <script src="modules/avatar.js"></script>

  <script>
    function handleRegistration(event) {
      event.preventDefault();
      const profile = saveProfile();
      if (profile) {
        window.location.href = "game.html";
      }
    }

    function showLogin() {
      alert("Login feature coming soon! For now, create a new profile.");
    }

    function populateSelects() {
      const countrySelect = document.getElementById("country");
      const languageSelect = document.getElementById("language");

      allCountries.sort((a, b) => a.name.localeCompare(b.name)).forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.name;
        opt.textContent = c.name;
        countrySelect.appendChild(opt);
      });

      allLanguages.sort((a, b) => a.name.localeCompare(b.name)).forEach(l => {
        const opt = document.createElement("option");
        opt.value = l.name;
        opt.textContent = l.name;
        languageSelect.appendChild(opt);
      });
    }

    populateSelects();
    autoLogin();
  </script>
</body>
</html>
